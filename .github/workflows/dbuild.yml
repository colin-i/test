on:
 workflow_dispatch:
  inputs:
   ppa:
    description: "build artifact"

jobs:
 dbuild:
  runs-on: ubuntu-24.04-arm
  steps:
   - uses: actions/checkout@v4
   - name: Run a multi-line script
     run: |
      mkdir -p .cargo/bin
      cd docker/rufflebld
      ../make
      pwd
      cd ../..
      pwd
      ls -la
      stat .cargo
      cd .cargo
      stat bin
      cd bin
      stat ruffle_desktop
      mv ruffle_desktop ../../
      echo "filepath=./ruffle_desktop" >> $GITHUB_ENV
   - name: artifact
     uses: actions/upload-artifact@v3
     with:
      name: release
      path: ${{ env.filepath }}
